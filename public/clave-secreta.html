<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clave Secreta — Aegis8</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --card: #1c2333;
  --accent: #00ff88;
  --yellow: #ffd166;
  --red: #ff6b6b;
  --blue: #58a6ff;
  --orange: #ff8c00;
  --purple: #bc8cff;
  --text: #e6edf3;
  --muted: #7d8590;
  --border: rgba(0,255,136,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: default;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0,255,136,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%, rgba(88,166,255,0.04) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* HEADER */
.header {
  position:relative; z-index:10;
  text-align:center;
  padding: 24px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.header-row { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:4px; }
.bot { width:40px; height:40px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
h1 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--accent); }
.subtitle { font-size:.85rem; color:var(--muted); font-weight:600; }

/* MAIN */
.main { position:relative; z-index:10; max-width:540px; margin:0 auto; padding:16px 16px 40px; display:flex; flex-direction:column; gap:16px; }

/* RECIPE SECTION */
.section-label {
  font-family:'Fredoka One',cursive;
  font-size:1rem; color:var(--muted);
  letter-spacing:1px; text-transform:uppercase;
  margin-bottom:8px;
}

.ingredients-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

.ingredient-box {
  background:var(--card);
  border:2px solid var(--border);
  border-radius:16px;
  padding:12px;
}

.ingredient-box h3 {
  font-family:'Fredoka One',cursive;
  font-size:.85rem;
  margin-bottom:8px;
  display:flex; align-items:center; gap:6px;
}

.chips {
  display:flex; flex-wrap:wrap; gap:6px;
}

.chip {
  background:var(--surface);
  border:2px solid transparent;
  border-radius:50px;
  padding:5px 12px;
  font-size:.82rem;
  font-weight:700;
  cursor:pointer;
  transition:all .18s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.chip:hover { transform:scale(1.06); }
.chip.selected {
  border-color: currentColor;
  transform:scale(1.08);
}

/* color per category */
.cat-animal .chip { color:var(--yellow); }
.cat-animal .chip.selected { background:rgba(255,209,102,.15); }
.cat-color .chip { color:var(--blue); }
.cat-color .chip.selected { background:rgba(88,166,255,.15); }
.cat-number .chip { color:var(--accent); }
.cat-number .chip.selected { background:rgba(0,255,136,.15); }
.cat-symbol .chip { color:var(--orange); }
.cat-symbol .chip.selected { background:rgba(255,140,0,.15); }

/* PASSWORD DISPLAY */
.pw-display {
  background:var(--card);
  border:2px solid var(--border);
  border-radius:20px;
  padding:16px 18px;
  position:relative;
  overflow:hidden;
}

.pw-label { font-family:'Fredoka One',cursive; font-size:.85rem; color:var(--muted); margin-bottom:10px; }

.pw-text {
  font-family:'Fredoka One',cursive;
  font-size:1.5rem;
  letter-spacing:2px;
  min-height:2rem;
  word-break:break-all;
  line-height:1.3;
  transition:all .3s;
}

.pw-piece { display:inline-block; transition:all .3s; }
.pw-piece.animal { color:var(--yellow); }
.pw-piece.color  { color:var(--blue); }
.pw-piece.number { color:var(--accent); }
.pw-piece.symbol { color:var(--orange); }
.pw-piece.empty  { color:var(--muted); font-size:1rem; }

.pw-copy {
  position:absolute; top:12px; right:14px;
  background:transparent;
  border:1.5px solid var(--border);
  border-radius:8px;
  color:var(--muted);
  font-size:.75rem;
  font-family:'Fredoka One',cursive;
  padding:4px 10px;
  cursor:pointer;
  transition:all .2s;
}
.pw-copy:hover { border-color:var(--accent); color:var(--accent); }

/* STRENGTH METER */
.strength-wrap {
  background:var(--card);
  border:2px solid var(--border);
  border-radius:20px;
  padding:14px 18px;
}

.strength-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:10px;
}
.strength-title { font-family:'Fredoka One',cursive; font-size:.85rem; color:var(--muted); }
.strength-label { font-family:'Fredoka One',cursive; font-size:1rem; transition:color .3s; }

.strength-bar-bg {
  background:var(--surface);
  border-radius:50px;
  height:14px;
  overflow:hidden;
  margin-bottom:10px;
}
.strength-bar {
  height:100%;
  border-radius:50px;
  transition:width .5s cubic-bezier(.4,0,.2,1), background .5s;
  width:0%;
}

.crack-time {
  font-size:.82rem;
  color:var(--muted);
  display:flex; align-items:center; gap:6px;
}
.crack-time span { color:var(--text); font-weight:700; }

/* CHECKLIST */
.checklist {
  display:flex; flex-direction:column; gap:6px;
  margin-top:10px;
}
.check-item {
  display:flex; align-items:center; gap:8px;
  font-size:.82rem;
  color:var(--muted);
  transition:color .3s;
}
.check-item.ok { color:var(--text); }
.check-dot {
  width:18px; height:18px;
  border-radius:50%;
  border:2px solid var(--muted);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.6rem;
  transition:all .3s;
}
.check-item.ok .check-dot {
  background:var(--accent);
  border-color:var(--accent);
  color:#0d1117;
}

/* WIN STATE */
.win-banner {
  background:linear-gradient(135deg, rgba(0,255,136,.1), rgba(88,166,255,.08));
  border:2px solid rgba(0,255,136,.3);
  border-radius:20px;
  padding:18px;
  text-align:center;
  display:none;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
.win-banner.show { display:block; }
@keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
.win-emoji { font-size:2.5rem; margin-bottom:6px; }
.win-title { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--accent); margin-bottom:6px; }
.win-msg { font-size:.85rem; color:var(--muted); line-height:1.5; }

/* RESET BTN */
.btn-reset {
  width:100%;
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:50px;
  color:var(--muted);
  font-family:'Fredoka One',cursive;
  font-size:1rem;
  padding:12px;
  cursor:pointer;
  transition:all .2s;
}
.btn-reset:hover { border-color:var(--accent); color:var(--accent); }

/* Particle canvas */
#particles { position:fixed; inset:0; pointer-events:none; z-index:5; }
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="header">
  <div class="header-row">
    <svg class="bot" viewBox="0 0 40 40" fill="none">
      <rect x="6" y="12" width="28" height="22" rx="7" fill="#1c2333" stroke="#00ff88" stroke-width="1.8"/>
      <rect x="14" y="5" width="12" height="9" rx="4" fill="#1c2333" stroke="#00ff88" stroke-width="1.8"/>
      <line x1="20" y1="12" x2="20" y2="14" stroke="#00ff88" stroke-width="1.8"/>
      <circle cx="15" cy="22" r="3.5" fill="#00ff88" opacity=".9"/>
      <circle cx="25" cy="22" r="3.5" fill="#00ff88" opacity=".9"/>
      <rect x="14" y="28" width="12" height="2.5" rx="1.2" fill="#00ff88" opacity=".6"/>
      <rect x="4" y="18" width="3.5" height="7" rx="1.7" fill="#00ff88" opacity=".4"/>
      <rect x="32.5" y="18" width="3.5" height="7" rx="1.7" fill="#00ff88" opacity=".4"/>
    </svg>
    <h1>Clave Secreta</h1>
  </div>
  <p class="subtitle">Mezcla ingredientes y construye la contraseña perfecta</p>
</div>

<div class="main">

  <!-- INGREDIENTS -->
  <div>
    <div class="section-label">🧪 Elige tus ingredientes</div>
    <div class="ingredients-grid">

      <div class="ingredient-box cat-animal">
        <h3>🐾 <span style="color:var(--yellow)">Animal</span></h3>
        <div class="chips" id="chips-animal"></div>
      </div>

      <div class="ingredient-box cat-color">
        <h3>🎨 <span style="color:var(--blue)">Color</span></h3>
        <div class="chips" id="chips-color"></div>
      </div>

      <div class="ingredient-box cat-number">
        <h3>🔢 <span style="color:var(--accent)">Número</span></h3>
        <div class="chips" id="chips-number"></div>
      </div>

      <div class="ingredient-box cat-symbol">
        <h3>⚡ <span style="color:var(--orange)">Símbolo</span></h3>
        <div class="chips" id="chips-symbol"></div>
      </div>

    </div>
  </div>

  <!-- PASSWORD DISPLAY -->
  <div class="pw-display">
    <div class="pw-label">🔐 Tu contraseña</div>
    <div class="pw-text" id="pwText">
      <span class="pw-piece empty">Elige ingredientes arriba ↑</span>
    </div>
    <button class="pw-copy" id="copyBtn" onclick="copyPw()">Copiar</button>
  </div>

  <!-- STRENGTH -->
  <div class="strength-wrap">
    <div class="strength-row">
      <div class="strength-title">💪 Fortaleza</div>
      <div class="strength-label" id="strengthLabel" style="color:var(--muted)">—</div>
    </div>
    <div class="strength-bar-bg">
      <div class="strength-bar" id="strengthBar"></div>
    </div>
    <div class="crack-time">⏱️ Un hacker tardaría <span id="crackTime">—</span> en adivinarla</div>
    <div class="checklist" id="checklist"></div>
  </div>

  <!-- WIN BANNER -->
  <div class="win-banner" id="winBanner">
    <div class="win-emoji">🏆</div>
    <div class="win-title">¡Contraseña Épica!</div>
    <div class="win-msg" id="winMsg"></div>
  </div>

  <button class="btn-reset" onclick="resetAll()">↩ Limpiar y empezar de nuevo</button>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const DATA = {
  animal: ['Tigre','Delfín','Águila','Zorro','Panda','Jaguar','Koala','Lobo'],
  color:  ['Rojo','Azul','Verde','Morado','Dorado','Negro','Celeste','Rosa'],
  number: ['7','13','42','99','007','123','2025','777'],
  symbol: ['!','@','#','$','%','&','*','?'],
};

const selected = { animal:null, color:null, number:null, symbol:null };

// ── INIT CHIPS ────────────────────────────────────────────────────────────────
function initChips() {
  Object.entries(DATA).forEach(([cat, items]) => {
    const container = document.getElementById(`chips-${cat}`);
    items.forEach(item => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = item;
      chip.dataset.cat = cat;
      chip.dataset.val = item;
      chip.addEventListener('click', () => selectChip(cat, item, chip));
      container.appendChild(chip);
    });
  });
}

function selectChip(cat, val, el) {
  // Deselect previous in same category
  document.querySelectorAll(`.chip[data-cat="${cat}"]`).forEach(c => c.classList.remove('selected'));
  
  if (selected[cat] === val) {
    selected[cat] = null;
  } else {
    selected[cat] = val;
    el.classList.add('selected');
    // Bounce animation
    el.style.transform = 'scale(1.2)';
    setTimeout(() => el.style.transform = '', 150);
  }
  
  update();
}

// ── BUILD PASSWORD ─────────────────────────────────────────────────────────────
function buildPassword() {
  const parts = [];
  if (selected.animal) parts.push({ val: selected.animal, cls: 'animal' });
  if (selected.color)  parts.push({ val: selected.color,  cls: 'color'  });
  if (selected.number) parts.push({ val: selected.number, cls: 'number' });
  if (selected.symbol) parts.push({ val: selected.symbol, cls: 'symbol' });
  return parts;
}

function getPasswordString() {
  return buildPassword().map(p => p.val).join('');
}

// ── STRENGTH CALC ─────────────────────────────────────────────────────────────
function calcStrength() {
  const pw = getPasswordString();
  const checks = {
    length:    pw.length >= 8,
    uppercase: /[A-ZÁÉÍÓÚÑ]/.test(pw),
    number:    /[0-9]/.test(pw),
    symbol:    /[^a-zA-Z0-9áéíóúñ]/.test(pw),
    long:      pw.length >= 12,
  };
  
  const count = Object.values(checks).filter(Boolean).length;
  
  // Estimate crack time (very rough, educational)
  let charset = 0;
  if (/[a-záéíóúñ]/.test(pw)) charset += 30;
  if (/[A-ZÁÉÍÓÚÑ]/.test(pw)) charset += 30;
  if (/[0-9]/.test(pw)) charset += 10;
  if (/[^a-zA-Z0-9áéíóúñ]/.test(pw)) charset += 32;
  
  const combos = Math.pow(charset || 1, pw.length);
  const attemptsPerSec = 1e10; // 10 billion/sec brute force
  const seconds = combos / attemptsPerSec;
  
  let crackLabel;
  if (pw.length === 0) crackLabel = '—';
  else if (seconds < 1) crackLabel = 'menos de 1 segundo 😱';
  else if (seconds < 60) crackLabel = `${Math.round(seconds)} segundos 😰`;
  else if (seconds < 3600) crackLabel = `${Math.round(seconds/60)} minutos 😬`;
  else if (seconds < 86400) crackLabel = `${Math.round(seconds/3600)} horas 😐`;
  else if (seconds < 2592000) crackLabel = `${Math.round(seconds/86400)} días 🙂`;
  else if (seconds < 31536000) crackLabel = `${Math.round(seconds/2592000)} meses 😊`;
  else if (seconds < 3.15e9) crackLabel = `${Math.round(seconds/31536000)} años 🔥`;
  else crackLabel = '¡miles de años! 🏆';
  
  return { checks, count, crackLabel };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function update() {
  const parts = buildPassword();
  const pw = getPasswordString();
  const pwEl = document.getElementById('pwText');
  
  if (parts.length === 0) {
    pwEl.innerHTML = '<span class="pw-piece empty">Elige ingredientes arriba ↑</span>';
  } else {
    pwEl.innerHTML = parts.map(p =>
      `<span class="pw-piece ${p.cls}">${p.val}</span>`
    ).join('');
  }
  
  const { checks, count, crackLabel } = calcStrength();
  
  // Strength bar
  const pct = pw.length === 0 ? 0 : Math.min(100, (count / 5) * 100);
  const bar = document.getElementById('strengthBar');
  bar.style.width = pct + '%';
  
  let color, label;
  if (pw.length === 0)   { color='var(--muted)'; label='—'; }
  else if (count <= 1)   { color='var(--red)';    label='Muy débil 😬'; }
  else if (count === 2)  { color='var(--orange)'; label='Débil 😐'; }
  else if (count === 3)  { color='var(--yellow)'; label='Regular 🙂'; }
  else if (count === 4)  { color='#a0e060';       label='Fuerte 💪'; }
  else                   { color='var(--accent)'; label='¡Épica! 🏆'; }
  
  bar.style.background = color;
  const lblEl = document.getElementById('strengthLabel');
  lblEl.textContent = label;
  lblEl.style.color = color;
  
  document.getElementById('crackTime').textContent = crackLabel;
  
  // Checklist
  const checkDefs = [
    { key:'length',    text:'Al menos 8 caracteres' },
    { key:'uppercase', text:'Tiene mayúsculas' },
    { key:'number',    text:'Tiene números' },
    { key:'symbol',    text:'Tiene símbolos (!@#...)' },
    { key:'long',      text:'Más de 12 caracteres (extra fuerte)' },
  ];
  
  const cl = document.getElementById('checklist');
  cl.innerHTML = checkDefs.map(c => `
    <div class="check-item ${checks[c.key] ? 'ok' : ''}">
      <div class="check-dot">${checks[c.key] ? '✓' : ''}</div>
      <span>${c.text}</span>
    </div>
  `).join('');
  
  // Win state
  const allSelected = Object.values(selected).every(v => v !== null);
  const win = document.getElementById('winBanner');
  if (allSelected && count >= 4) {
    win.classList.add('show');
    document.getElementById('winMsg').textContent =
      `Tu contraseña "${pw}" es muy segura. ¡Tardarían ${crackLabel} en romperla! Recuerda: nunca la compartas con nadie, ni con tus amigos.`;
    if (count === 5) launchConfetti();
  } else {
    win.classList.remove('show');
  }
}

// ── COPY ─────────────────────────────────────────────────────────────────────
function copyPw() {
  const pw = getPasswordString();
  if (!pw) return;
  navigator.clipboard.writeText(pw).catch(() => {});
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ Copiado';
  btn.style.color = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  setTimeout(() => {
    btn.textContent = 'Copiar';
    btn.style.color = '';
    btn.style.borderColor = '';
  }, 2000);
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetAll() {
  Object.keys(selected).forEach(k => selected[k] = null);
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('winBanner').classList.remove('show');
  update();
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
let confettiDone = false;
function launchConfetti() {
  if (confettiDone) return;
  confettiDone = true;
  const colors = ['#00ff88','#ffd166','#58a6ff','#ff6b6b','#bc8cff','#ff8c00'];
  for (let i = 0; i < 50; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.style.cssText = `
        position:fixed; top:-10px; left:${Math.random()*100}vw;
        width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>.5?'50%':'2px'};
        pointer-events:none; z-index:999;
        animation:fall ${1+Math.random()*1.5}s linear forwards;
      `;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }, i * 40);
  }
}

// CSS for confetti fall
const style = document.createElement('style');
style.textContent = `@keyframes fall {
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(105vh) rotate(540deg);opacity:0}
}`;
document.head.appendChild(style);

// ── PARTICLES ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, dots = [];

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initDots() {
  dots = Array.from({length:30}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
    r: Math.random()*1.5+.5,
    a: Math.random()*.4+.1,
  }));
}

function animateDots() {
  ctx.clearRect(0,0,W,H);
  dots.forEach(d => {
    d.x += d.vx; d.y += d.vy;
    if (d.x<0) d.x=W; if (d.x>W) d.x=0;
    if (d.y<0) d.y=H; if (d.y>H) d.y=0;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,255,136,${d.a})`;
    ctx.fill();
  });
  requestAnimationFrame(animateDots);
}

window.addEventListener('resize', () => { resizeCanvas(); initDots(); });
resizeCanvas(); initDots(); animateDots();

// ── BOOT ──────────────────────────────────────────────────────────────────────
initChips();
update();
</script>
</body>
</html>
