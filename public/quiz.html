<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#080c14"/>
<title>Aegis8 · Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#080c14;color:#eaf0f8;font-family:'Lato',sans-serif;font-weight:300;}
:root{
  --bg:#080c14;--bg2:#0d1422;--ink:#eaf0f8;--ink2:#8898b0;--ink3:#3a4f68;
  --accent:#f07830;--blue:#3a7fd4;--green:#2ecc80;--gold:#f5a823;
  --border:rgba(58,127,212,.12);--border-o:rgba(240,120,48,.15);
}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(rgba(58,127,212,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(58,127,212,.02) 1px,transparent 1px);
  background-size:60px 60px;}

.wrap{max-width:520px;margin:0 auto;padding:0 20px;position:relative;z-index:1;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* ── SCREENS ── */
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 0;}
.screen.hidden{display:none;}

/* ── CODE ENTRY ── */
.code-logo{margin-bottom:28px;animation:up .6s ease both;}
.code-title{font-family:'DM Serif Display',serif;font-size:clamp(2rem,7vw,3.2rem);
  line-height:.95;letter-spacing:-1px;text-align:center;margin-bottom:10px;
  animation:up .7s .1s ease both;}
.code-title em{color:var(--accent);font-style:italic;display:block;}
.code-sub{font-size:.88rem;color:var(--ink2);text-align:center;line-height:1.6;
  margin-bottom:36px;animation:up .7s .2s ease both;}
.code-input-wrap{width:100%;max-width:320px;animation:up .7s .3s ease both;}
.code-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--accent);display:block;margin-bottom:6px;}
.code-input{width:100%;background:var(--bg2);border:1px solid var(--border-o);
  border-radius:4px;color:var(--ink);font-family:'JetBrains Mono',monospace;
  font-size:1.4rem;letter-spacing:6px;text-align:center;text-transform:uppercase;
  padding:16px;outline:none;transition:border-color .2s;}
.code-input:focus{border-color:var(--accent);}
.code-input::placeholder{color:var(--ink3);font-size:1rem;letter-spacing:2px;}
.code-name-wrap{width:100%;max-width:320px;margin-top:14px;animation:up .7s .35s ease both;}
.name-input{width:100%;background:var(--bg2);border:1px solid var(--border);
  border-radius:4px;color:var(--ink);font-family:'Lato',sans-serif;font-size:1rem;
  padding:12px 14px;outline:none;transition:border-color .2s;}
.name-input:focus{border-color:var(--accent);}
.name-input::placeholder{color:var(--ink3);}
.code-btn{width:100%;max-width:320px;margin-top:14px;padding:14px;
  font-family:'JetBrains Mono',monospace;font-size:.72rem;letter-spacing:2px;
  text-transform:uppercase;color:#080c14;background:var(--accent);
  border:none;border-radius:4px;cursor:pointer;transition:background .2s;
  animation:up .7s .4s ease both;}
.code-btn:hover{background:#d4611a;}
.code-error{color:#ef4444;font-family:'JetBrains Mono',monospace;font-size:.65rem;
  letter-spacing:1px;text-align:center;margin-top:10px;display:none;}
.code-error.show{display:block;}

/* ── QUIZ SCREEN ── */
.quiz-header{width:100%;padding:16px 20px;background:rgba(8,12,20,.9);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;}
.qh-left{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--ink3);}
.qh-left span{color:var(--accent);}
.qh-prog{display:flex;align-items:center;gap:8px;}
.qh-dots{display:flex;gap:4px;}
.qdot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s;}
.qdot.done{background:var(--green);}
.qdot.active{background:var(--accent);}
.quiz-body{padding-top:80px;padding-bottom:40px;width:100%;}
.q-wrap{max-width:520px;margin:0 auto;padding:24px 20px;}

.q-num{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:3px;
  color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
.q-text{font-family:'DM Serif Display',serif;font-size:clamp(1.2rem,4vw,1.7rem);
  color:var(--ink);line-height:1.3;margin-bottom:8px;}
.q-context{font-size:.84rem;color:var(--ink2);line-height:1.6;margin-bottom:24px;
  background:var(--bg2);border-left:3px solid var(--border-o);
  padding:12px 14px;border-radius:0 4px 4px 0;}

.q-options{display:flex;flex-direction:column;gap:8px;}
.q-opt{background:var(--bg2);border:1px solid var(--border);border-radius:4px;
  padding:14px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;
  font-size:.9rem;color:var(--ink2);line-height:1.4;}
.q-opt:hover{border-color:rgba(240,120,48,.3);color:var(--ink);background:rgba(255,255,255,.03);}
.q-opt.selected{border-color:var(--accent);color:var(--ink);background:rgba(240,120,48,.06);}
.q-opt.correct{border-color:var(--green)!important;color:var(--green)!important;background:rgba(46,204,128,.07)!important;}
.q-opt.wrong{border-color:#ef4444!important;color:#ef4444!important;background:rgba(239,68,68,.07)!important;}
.q-opt.disabled{cursor:not-allowed;opacity:.7;}
.opt-letter{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;
  width:24px;height:24px;border-radius:50%;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  color:var(--ink3);transition:all .2s;}
.q-opt.selected .opt-letter{border-color:var(--accent);color:var(--accent);}
.q-opt.correct .opt-letter{border-color:var(--green);color:var(--green);}
.q-opt.wrong .opt-letter{border-color:#ef4444;color:#ef4444;}

.q-feedback{margin-top:14px;padding:12px 14px;border-radius:4px;
  font-size:.84rem;line-height:1.6;display:none;border-left:3px solid;}
.q-feedback.show{display:block;}
.q-feedback.right{background:rgba(46,204,128,.07);border-color:var(--green);color:var(--green);}
.q-feedback.wrong{background:rgba(239,68,68,.07);border-color:#ef4444;color:#ef4444;}

.q-next{margin-top:16px;width:100%;padding:13px;font-family:'JetBrains Mono',monospace;
  font-size:.68rem;letter-spacing:2px;text-transform:uppercase;
  color:#080c14;background:var(--accent);border:none;border-radius:4px;
  cursor:pointer;transition:background .2s;display:none;}
.q-next.show{display:block;}
.q-next:hover{background:#d4611a;}

/* ── RESULTADO FINAL ── */
.result-screen{text-align:center;padding:40px 20px;}
.result-score-big{font-family:'DM Serif Display',serif;
  font-size:clamp(4rem,15vw,7rem);line-height:1;color:var(--accent);
  font-style:italic;margin-bottom:8px;}
.result-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;
  letter-spacing:3px;color:var(--ink3);text-transform:uppercase;margin-bottom:28px;}
.result-title{font-family:'DM Serif Display',serif;font-size:1.8rem;
  color:var(--ink);margin-bottom:8px;line-height:1.2;}
.result-sub{font-size:.88rem;color:var(--ink2);line-height:1.7;max-width:360px;
  margin:0 auto 28px;}
.result-answers{background:var(--bg2);border:1px solid var(--border);border-radius:4px;
  overflow:hidden;margin-bottom:24px;text-align:left;}
.ra-row{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:flex-start;gap:10px;}
.ra-row:last-child{border-bottom:none;}
.ra-ico{font-size:1rem;flex-shrink:0;margin-top:1px;}
.ra-q{font-size:.8rem;color:var(--ink2);line-height:1.4;}
.ra-a{font-size:.78rem;color:var(--ink3);margin-top:2px;}
.ra-row.ra-ok .ra-q{color:var(--green);}
.ra-row.ra-ko .ra-q{color:#ef4444;}
.result-cta{display:flex;flex-direction:column;gap:10px;align-items:center;}
.btn-result{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:2px;
  text-transform:uppercase;padding:12px 28px;border-radius:4px;
  text-decoration:none;transition:all .2s;display:inline-block;}
.btn-r1{color:#080c14;background:var(--accent);}
.btn-r1:hover{background:#d4611a;}
.btn-r2{color:var(--ink2);border:1px solid var(--border);background:transparent;}
.btn-r2:hover{color:var(--ink);border-color:rgba(255,255,255,.2);}
</style>
</head>
<body>

<!-- ═══════════════════════ SCREEN: CÓDIGO ═══════════════════════ -->
<div class="screen" id="screen-code">
<div class="wrap" style="display:flex;flex-direction:column;align-items:center;">
  <div class="code-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" width="72" height="72">
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f5c842"/>
          <stop offset="100%" stop-color="#f07830"/>
        </linearGradient>
      </defs>
      <path d="M60 8 C48 8 32 13 22 20 L14 26 L14 62 C14 82 34 96 60 108 C86 96 106 82 106 62 L106 26 L98 20 C88 13 72 8 60 8 Z"
        fill="#0d1422" stroke="url(#lg)" stroke-width="2"/>
      <path d="M60 28 C52 28 46 33 46 40 C46 45 49 49 54 52 C49 55 44 60 44 66 C44 75 51 81 60 81 C69 81 76 75 76 66 C76 60 71 55 66 52 C71 49 74 45 74 40 C74 33 68 28 60 28 Z"
        fill="none" stroke="url(#lg)" stroke-width="3" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1 class="code-title">Quiz<br><em>Aegis8</em></h1>
  <p class="code-sub">Ingresa el código que te dio tu profe para empezar el módulo.</p>
  
  <div class="code-input-wrap">
    <label class="code-label" for="ci">Código de clase</label>
    <input class="code-input" id="ci" maxlength="7" placeholder="A8-0000"
      oninput="fmtCode(this)" onkeydown="if(event.key==='Enter')checkCode()"/>
  </div>
  <div class="code-name-wrap">
    <input class="name-input" id="ni" maxlength="40" placeholder="Tu nombre (ej: Sofía M.)"
      onkeydown="if(event.key==='Enter')checkCode()"/>
  </div>
  <button class="code-btn" onclick="checkCode()">Empezar →</button>
  <div class="code-error" id="code-err">Código no reconocido. Pídele a tu profe el código correcto.</div>
</div>
</div>

<!-- ═══════════════════════ SCREEN: QUIZ ═══════════════════════ -->
<div class="screen hidden" id="screen-quiz" style="padding:0;justify-content:flex-start;align-items:stretch;">
  <div class="quiz-header">
    <div class="qh-left">AEGIS<span>8</span> · <span id="qh-mod">Módulo</span></div>
    <div class="qh-prog">
      <div class="qh-dots" id="qh-dots"></div>
    </div>
  </div>
  <div class="quiz-body">
    <div class="q-wrap">
      <div class="q-num" id="q-num">Pregunta 1 / 5</div>
      <div class="q-text" id="q-text"></div>
      <div class="q-context" id="q-context" style="display:none;"></div>
      <div class="q-options" id="q-options"></div>
      <div class="q-feedback" id="q-feedback"></div>
      <button class="q-next" id="q-next" onclick="nextQ()">Siguiente →</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ SCREEN: RESULTADO ═══════════════════════ -->
<div class="screen hidden" id="screen-result">
<div class="wrap result-screen">
  <div class="result-score-big" id="r-score">0/5</div>
  <div class="result-label" id="r-label">Resultado</div>
  <div class="result-title" id="r-title">Bien hecho</div>
  <div class="result-sub" id="r-sub"></div>
  <div class="result-answers" id="r-answers"></div>
  <div class="result-cta">
    <a href="/educa.html" class="btn-result btn-r1">Aprender más →</a>
    <a href="/app/" class="btn-result btn-r2">Volver al inicio</a>
  </div>
</div>
</div>

<script>
// ══════════════════════════════════
// MÓDULOS DE QUIZ — contenido real
// ══════════════════════════════════

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let STATE = {
  code: null,
  nombre: '',
  modulo: null,
  preguntas: [],
  idx: 0,
  respuestas: [],
  score: 0,
};

// ══════════════════════════════════
// CODE ENTRY
// ══════════════════════════════════
function fmtCode(input) {
  let v = input.value.toUpperCase().replace(/[^A8\-0-9]/g, '');
  if (v.length > 2 && !v.includes('-')) v = v.slice(0,2) + '-' + v.slice(2);
  input.value = v.slice(0, 7);
}

function checkCode() {
  const code = document.getElementById('ci').value.trim().toUpperCase();
  const nombre = document.getElementById('ni').value.trim();
  
  if (!nombre) {
    document.getElementById('ni').focus();
    document.getElementById('ni').style.borderColor = 'var(--accent)';
    return;
  }
  
  // Validate format A8-XXXX
  if (!/^A8-\d{4}$/.test(code)) {
    showErr('El código debe tener el formato A8-0000. Pídele a tu profe el código correcto.');
    return;
  }
  
  // Look up module from code
  // In production this would call an API
  // For now: last digit maps to module
  const mods = ['phishing','grooming','privacidad','contraseñas','ciberbullying','datospersonales'];
  const digit = parseInt(code.slice(-1));
  const modKey = mods[digit % mods.length];
  
  // Check if there's a saved class in localStorage (from docente app)
  const clases = JSON.parse(localStorage.getItem('aegis8_pwa') || '{}').clases || [];
  const clase = clases.find(c => c.code === code);
  const realMod = clase ? clase.modulo : modKey;
  
  if (!MODULOS[realMod]) {
    showErr('Código no reconocido. Pídele a tu profe el código correcto.');
    return;
  }
  
  STATE.code = code;
  STATE.nombre = nombre;
  STATE.modulo = realMod;
  STATE.preguntas = MODULOS[realMod].preguntas;
  STATE.idx = 0;
  STATE.respuestas = [];
  STATE.score = 0;
  
  startQuiz();
}

function showErr(msg) {
  const e = document.getElementById('code-err');
  e.textContent = msg;
  e.classList.add('show');
}

// ══════════════════════════════════
// QUIZ
// ══════════════════════════════════
function startQuiz() {
  document.getElementById('screen-code').classList.add('hidden');
  document.getElementById('screen-quiz').classList.remove('hidden');
  document.getElementById('qh-mod').textContent = MODULOS[STATE.modulo].nombre;
  buildDots();
  renderQ();
}

function buildDots() {
  const c = document.getElementById('qh-dots');
  c.innerHTML = STATE.preguntas.map((_,i) =>
    `<div class="qdot ${i===0?'active':''}" id="dot-${i}"></div>`
  ).join('');
}

function renderQ() {
  const q = STATE.preguntas[STATE.idx];
  const n = STATE.idx + 1;
  const total = STATE.preguntas.length;
  
  document.getElementById('q-num').textContent = `Pregunta ${n} / ${total}`;
  document.getElementById('q-text').textContent = q.texto;
  
  const ctx = document.getElementById('q-context');
  if (q.contexto) {
    ctx.textContent = q.contexto;
    ctx.style.display = 'block';
  } else {
    ctx.style.display = 'none';
  }
  
  const letters = ['A','B','C','D'];
  document.getElementById('q-options').innerHTML = q.opciones.map((opt, i) => `
    <div class="q-opt" id="opt-${i}" onclick="selectOpt(${i})">
      <div class="opt-letter">${letters[i]}</div>
      <span>${opt}</span>
    </div>
  `).join('');
  
  document.getElementById('q-feedback').className = 'q-feedback';
  document.getElementById('q-feedback').textContent = '';
  document.getElementById('q-next').className = 'q-next';
  document.getElementById('q-next').textContent = 
    STATE.idx < total - 1 ? 'Siguiente →' : 'Ver resultado →';
}

function selectOpt(i) {
  const q = STATE.preguntas[STATE.idx];
  if (document.querySelector('.q-opt.selected')) return; // ya respondió
  
  const opts = document.querySelectorAll('.q-opt');
  opts.forEach(o => o.classList.add('disabled'));
  opts[i].classList.add('selected');
  
  const correct = i === q.correcta;
  if (correct) STATE.score++;
  
  STATE.respuestas.push({ pregunta: q.texto, elegida: i, correcta: q.correcta, ok: correct });
  
  // Show correct/wrong
  opts[i].classList.add(correct ? 'correct' : 'wrong');
  if (!correct) opts[q.correcta].classList.add('correct');
  
  // Feedback
  const fb = document.getElementById('q-feedback');
  fb.textContent = correct ? q.feedback_ok : q.feedback_ko;
  fb.className = 'q-feedback show ' + (correct ? 'right' : 'wrong');
  
  // Update dot
  document.getElementById(`dot-${STATE.idx}`).className = 'qdot done';
  
  document.getElementById('q-next').className = 'q-next show';
}

function nextQ() {
  STATE.idx++;
  if (STATE.idx >= STATE.preguntas.length) {
    showResult();
    return;
  }
  // Update dot
  document.getElementById(`dot-${STATE.idx}`).className = 'qdot active';
  renderQ();
}

// ══════════════════════════════════
// RESULTADO
// ══════════════════════════════════
function showResult() {
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');
  
  const total = STATE.preguntas.length;
  const s = STATE.score;
  const pct = Math.round(s/total*100);
  
  document.getElementById('r-score').textContent = `${s}/${total}`;
  document.getElementById('r-label').textContent = `${pct}% correcto · ${MODULOS[STATE.modulo].nombre}`;
  
  let title, sub;
  if (pct === 100) {
    title = '¡Perfecto, ' + STATE.nombre.split(' ')[0] + '!';
    sub = 'Respondiste todo correctamente. Ya sabes detectar esta amenaza. Comparte lo que aprendiste con alguien en casa.';
  } else if (pct >= 60) {
    title = 'Bien hecho';
    sub = `Respondiste ${s} de ${total} correctamente. Revisa las que fallaste — el feedback de cada pregunta explica por qué.`;
  } else {
    title = 'Sigue practicando';
    sub = `Respondiste ${s} de ${total}. No pasa nada — lo importante es aprender. Lee el feedback de cada pregunta y vuelve a intentarlo.`;
  }
  
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-sub').textContent = sub;
  
  // Answer review
  document.getElementById('r-answers').innerHTML = STATE.respuestas.map(r => `
    <div class="ra-row ${r.ok ? 'ra-ok' : 'ra-ko'}">
      <div class="ra-ico">${r.ok ? '✓' : '✗'}</div>
      <div>
        <div class="ra-q">${r.pregunta}</div>
        ${!r.ok ? `<div class="ra-a">Correcta: ${STATE.preguntas[STATE.respuestas.indexOf(r)].opciones[r.correcta]}</div>` : ''}
      </div>
    </div>
  `).join('');
  
  // Save result to localStorage for docente dashboard
  saveResult();
}

function saveResult() {
  try {
    const pwaData = JSON.parse(localStorage.getItem('aegis8_pwa') || '{}');
    const clases = pwaData.clases || [];
    const clase = clases.find(c => c.code === STATE.code);
    if (clase) {
      clase.resultados = clase.resultados || [];
      clase.resultados.push({
        nombre: STATE.nombre,
        puntaje: Math.round(STATE.score / STATE.preguntas.length * 100),
        ts: Date.now()
      });
      localStorage.setItem('aegis8_pwa', JSON.stringify(pwaData));
    }
  } catch(e) {}
}

// ══════════════════════════════════
// INIT — check URL params
// ══════════════════════════════════
(function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.getElementById('ci').value = code.toUpperCase();
  }
})();
</script>
